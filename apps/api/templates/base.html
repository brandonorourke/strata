<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Strata UI" }}</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Georgia", "Times New Roman", serif;
        background: #f6f4ef;
        color: #1e1e1e;
      }
      .container {
        max-width: 1100px;
        margin: 32px auto;
        padding: 0 20px 40px;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        border-bottom: 1px solid #d9d4c8;
        padding-bottom: 12px;
        margin-bottom: 20px;
      }
      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0.5px;
      }
      a {
        color: #1e1e1e;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border: 1px solid #e4e0d7;
      }
      th, td {
        text-align: left;
        vertical-align: top;
        padding: 10px 12px;
        border-bottom: 1px solid #eee8dd;
      }
      th {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: #f3efe6;
      }
      .meta {
        font-size: 12px;
        color: #5b554a;
      }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border: 1px solid #c9c3b6;
        border-radius: 999px;
        font-size: 11px;
        margin-right: 6px;
        margin-bottom: 4px;
        background: #faf7f1;
      }
      .status {
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.08em;
        padding: 2px 6px;
        border-radius: 6px;
        border: 1px solid #c9c3b6;
        background: #f3efe6;
      }
      .status.confirmed {
        border-color: #6b8f6a;
        background: #e7f2e7;
      }
      .events {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .event {
        border: 1px solid #e2dacb;
        background: #fbf8f2;
        padding: 6px 8px;
        border-radius: 8px;
        font-size: 12px;
        max-width: 240px;
      }
      .event strong {
        display: block;
        font-size: 12px;
        margin-bottom: 2px;
      }
      .actions a {
        margin-right: 10px;
        font-size: 12px;
      }
      .article-text {
        white-space: pre-wrap;
        background: #fff;
        padding: 16px;
        border: 1px solid #e4e0d7;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div>
          <h1><a href="/">Strata Articles</a></h1>
          <div class="meta">
            <a href="/">Articles</a> ·
            <a href="/canonicals">Canonicals</a>
          </div>
        </div>
        <div class="meta">v0 viewer</div>
      </header>
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
