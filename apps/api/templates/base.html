<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Strata UI" }}</title>
    <style>
      :root {
        color-scheme: light;
        --accent: #5851ec;
        --accent-dark: #423bd6;
        --accent-tint: #eef0ff;
        --ink: #1a1f36;
        --muted: #6b7280;
        --border: #e5e7eb;
        --bg: #f6f7fb;
        --surface: #ffffff;
        --radius: 10px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--ink);
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      .container {
        max-width: 1180px;
        margin: 0 auto;
        padding: 0 24px 56px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 24px;
        margin: 0 0 28px;
        max-width: 1180px;
        margin-left: auto;
        margin-right: auto;
        border-bottom: 1px solid var(--border);
      }
      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      h1 a {
        color: var(--ink);
      }
      h2 {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0 0 16px;
      }
      h3 {
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin: 28px 0 10px;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        color: var(--accent-dark);
        text-decoration: underline;
      }
      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
      }
      th, td {
        text-align: left;
        vertical-align: top;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
      }
      th {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        background: #fafbfc;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }
      tbody tr:hover {
        background: #fafbff;
      }
      .meta {
        font-size: 12.5px;
        color: var(--muted);
      }
      .pill {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
        margin-right: 6px;
        margin-bottom: 4px;
        background: var(--accent-tint);
        color: var(--accent-dark);
      }
      .status {
        text-transform: uppercase;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.06em;
        padding: 3px 8px;
        border-radius: 6px;
        background: #f3f4f6;
        color: var(--muted);
      }
      .status.confirmed {
        background: #ecfdf5;
        color: #047857;
      }
      .events {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .event {
        border: 1px solid var(--border);
        background: #fafbfc;
        padding: 8px 10px;
        border-radius: 8px;
        font-size: 12.5px;
        max-width: 240px;
      }
      .event strong {
        display: block;
        font-size: 12.5px;
        margin-bottom: 2px;
        color: var(--ink);
      }
      .score {
        font-weight: 700;
        color: var(--accent-dark);
      }
      .actions a {
        margin-right: 14px;
        font-size: 12.5px;
        font-weight: 500;
      }
      .article-text {
        white-space: pre-wrap;
        background: #fafbfc;
        color: var(--ink);
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-family: "SF Mono", Menlo, Consolas, monospace;
        font-size: 12.5px;
      }
      form {
        margin-bottom: 4px;
      }
      input[type="text"] {
        font-family: inherit;
        font-size: 13px;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
      }
      input[type="text"]:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-tint);
      }
      button, input[type="submit"] {
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        padding: 8px 16px;
        border: none;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
      }
      button:hover, input[type="submit"]:hover {
        background: var(--accent-dark);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div>
          <h1><a href="/">Strata</a></h1>
        </div>
        <div class="meta">v0 viewer</div>
      </header>
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
